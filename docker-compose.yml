services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: knowledgeforge-api:latest
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-disabled}
      EMBEDDING_LOCAL_MODEL: ${EMBEDDING_LOCAL_MODEL:-BAAI/bge-m3}
      EMBEDDING_LOCAL_DEVICE: ${EMBEDDING_LOCAL_DEVICE:-cpu}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_MODEL: ${EMBEDDING_API_MODEL:-text-embedding-3-small}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      VECTOR_STORE_TYPE: chroma
      API_HOST: 0.0.0.0
      API_PORT: 8080
      UPLOAD_DIR: /app/uploads
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      KAFKA_TOPIC_DOC_CHANGES: ${KAFKA_TOPIC_DOC_CHANGES:-doc-changes}
      KAFKA_TOPIC_KG_UPDATES: ${KAFKA_TOPIC_KG_UPDATES:-kg-updates}
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_data:/app/chroma_data
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
